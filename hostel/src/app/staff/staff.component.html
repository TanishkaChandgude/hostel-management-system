<div class="breadcrumb">
  <span class="home" routerLink="/student/student-dashboard">
    <i class="fas fa-home"></i> Home
  </span>
  <span class="separator">/</span>
  <span class="current">Staff</span>
</div>
<div class="container mt-4">

  <h4 class="mb-4 fw-bold">👨‍💼 Staff Directory</h4>

  <div class="row g-4">

    <div class="col-md-4" *ngFor="let staff of staffList">

      <div class="card staff-card text-center p-3">

        <!-- Avatar -->
        <div class="avatar mb-3">
         {{ staff.name ? staff.name.charAt(0) : '' }}
        </div>

        <!-- Name -->
        <h5 class="fw-bold">{{ staff.name }}</h5>

        <!-- Role -->
        <span class="badge bg-primary mb-2">
          {{ staff.role }}
        </span>

        <!-- Phone (Display Only) -->
        <p class="text-muted mb-1">
          <i class="fas fa-phone"></i> {{ staff.phone }}
        </p>

        <!-- Email (Clickable) -->
        <p class="text-muted">
          <i class="fas fa-envelope"></i> 
          <a href="mailto:{{staff.email}}" class="email-link">
            {{ staff.email }}
          </a>
        </p>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-center gap-2 mt-2">

          <!-- WhatsApp -->
          <button class="btn btn-success btn-sm"
                  (click)="openWhatsApp(staff.phone)">
            💬 WhatsApp
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
