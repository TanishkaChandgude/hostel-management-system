
<div class="breadcrumb">
  <span class="home" routerLink="/admins/dashboard">
    <i class="fas fa-home"></i> Home
  </span>
  <span class="separator">/</span>
  <span class="current">Register New Student</span>
</div>
<div class="register-page">

  <div class="register-container">

    <h2>🎓 Create Student Account</h2>

    <form (ngSubmit)="register()">

      <div class="form-group">
        <input type="text" placeholder="Full Name"
          [(ngModel)]="user.name" name="name" required>
      </div>

      <div class="form-group">
        <input type="email" placeholder="Email"
          [(ngModel)]="user.email" name="email" required>
      </div>

      <div class="form-group">
        <input type="password" placeholder="Password"
          [(ngModel)]="user.password" name="password" required>
      </div>

      <div class="form-group">
        <input type="text" placeholder="Branch (e.g. CSE, IT)"
          [(ngModel)]="user.branch" name="branch" required>
      </div>

      <div class="form-group">
        <input type="text" placeholder="Roll Number"
          [(ngModel)]="user.rollNo" name="rollNo" required>
      </div>

     

      <div class="form-group">
        <select [(ngModel)]="user.year" name="year" required>
          <option value="" disabled selected>Select Year of Study</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>
       <div class="form-group">
       <p class="note">
  🏠 Room will be automatically assigned after registration
</p>
      </div>

      <button type="submit">Register</button>

    </form>

  </div>

</div>
