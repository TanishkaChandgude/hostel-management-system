<div class="container-fluid">
  <div class="row">

    <!-- 🔥 LEFT SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar p-3">

      <h5 class="text-white mb-4">👤 Admin Panel</h5>

      <ul class="list-group list-group-flush">

        <li class="list-group-item bg-transparent text-white d-flex justify-content-between">
          <span><i class="fas fa-house"></i> Total Rooms</span>
          <strong>{{stats.totalRooms}}</strong>
        </li>

        <li class="list-group-item bg-transparent text-white d-flex justify-content-between">
          <span><i class="fas fa-door-open"></i> Avaliable Rooms</span>
          <strong>{{stats.availableRooms}}</strong>
        </li>

        <!-- <li class="list-group-item bg-transparent text-white d-flex justify-content-between">
          <span><i class="fas fa-bullhorn me-2"></i>Complaints</span>
          <strong>{{dashboard.complaints}}</strong>
        </li> -->

      </ul>

      <hr class="bg-light">

      <h6 class="text-white mt-3">🛠️ Admin Control</h6>
      <p class="text-light small">
        Manage students, rooms, and hostel operations efficiently from one place.
      </p>

      <h6 class="text-white mt-3">📊 Overview</h6>
      <p class="text-light small">
       Get real-time insights and monitor hostel activity at a glance.
      </p>

    </div>

    <!-- 🎯 RIGHT CONTENT -->
    <div class="col-md-9 col-lg-10 p-4">

      <!-- 🔍 Search -->
      <div class="mb-3">
        <input type="text" class="form-control w-25"
               placeholder="🔍 Search Module..."
               [(ngModel)]="searchText">
      </div>

      <!-- Cards -->
      <div class="row g-4">

        <div class="col-xl-3 col-lg-4 col-md-6"
             *ngFor="let module of filteredModules()">

          <!-- ✅ FIX HERE -->
          <div class="card text-center p-3 shadow-sm module-card"
               [routerLink]="module.route"
               style="cursor: pointer;">

            <div class="icon mb-2">
              <i [class]="module.icon"></i>
            </div>

            <h6>{{module.name}}</h6>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>
