<div class="container mt-4">

  <h4 class="mb-4 fw-bold">💰 Manage Student Fees</h4>

  <div class="card p-4 shadow-sm">

    <!-- 🔢 Enrollment No -->
    <input class="form-control mb-2"
           placeholder="Enter Enrollment No"
           [(ngModel)]="formData.rollNo"
           (blur)="fetchStudent()">

    <!-- ❌ Error Message -->
    <small class="text-danger" *ngIf="!formData.email && formData.rollNo">
      ❌ Student not found
    </small>

    <!-- 👤 Name (Auto Fill) -->
    <input class="form-control mb-3"
           placeholder="Student Name"
           [(ngModel)]="formData.name"
           disabled>

    <!-- 🏠 Hostel Fees -->
    <h6>🏠 Hostel Fees</h6>

    <input type="number"
           class="form-control mb-2"
           placeholder="Paid Amount"
           [(ngModel)]="formData.hostelPaid">

    <input type="date"
           class="form-control mb-3"
           [(ngModel)]="formData.hostelDue">

    <!-- 🍽 Mess Fees -->
    <h6>🍽 Mess Fees</h6>

    <input type="number"
           class="form-control mb-2"
           placeholder="Paid Amount"
           [(ngModel)]="formData.messPaid">

    <input type="date"
           class="form-control mb-3"
           [(ngModel)]="formData.messDue">

    <!-- 🚀 Button -->
    <button class="btn btn-primary w-100"
            (click)="submitFees()"
            [disabled]="!formData.email">
      Update Fees
    </button>

  </div>

</div>
