<div class="breadcrumb">
  <span class="home" routerLink="/student/student-dashboard">
    <i class="fas fa-home"></i> Home
  </span>
  <span class="separator">/</span>
  <span class="current">Leave</span>
</div>

<div class="leave-container">

  <!-- 🔥 Breadcrumb Navigation -->
  

  <h2>Leave Management</h2>

  <form #leaveForm="ngForm" (ngSubmit)="applyLeave()">

    <div class="form-group">
      <label>From Date</label>
      <input type="date" [(ngModel)]="leave.fromDate" [min]="today" name="fromDate" required>
    </div>

    <div class="form-group">
      <label>To Date</label>
      <input type="date" [(ngModel)]="leave.toDate" [min]="leave.fromDate" name="toDate" required>
    </div>

    <div class="form-group">
      <label>Reason</label>
      <textarea [(ngModel)]="leave.reason" name="reason" required></textarea>
    </div>

    <button class="apply-btn" [disabled]="leaveForm.invalid">Apply Leave</button>

  </form>

  <hr>

  <h3>My Leave Requests</h3>

  <table>
    <tr>
      <th>From</th>
      <th>To</th>
      <th>Reason</th>
      <th>Status</th>
    </tr>

    <tr *ngFor="let l of leaves">
      <td>{{l.fromDate | date}}</td>
      <td>{{l.toDate | date}}</td>
      <td>{{l.reason}}</td>
      <td>{{l.status}}</td>
    </tr>
  </table>

</div>
